<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin TOKEN GRAB</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f2f2f2; }
    .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #FF5722; }
    input, button, select { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    button { background: #FF5722; color: white; cursor: pointer; font-weight: bold; border: none; }
    button:hover { background: #E64A19; }
    #status { font-size: 24px; font-weight: bold; color: green; }
  </style>
</head>
<body>
  <h1>Dashboard TOKEN GRAB</h1>

  <div class="card">
    <h2>Status Sekarang: <span id="status">Loading...</span></h2>
    <select id="statusInput">
      <option value="Buka">Buka</option>
      <option value="Tutup">Tutup</option>
      <option value="Antrian Penuh">Antrian Penuh</option>
    </select>
    <button onclick="updateStatus()">Update Status</button>
  </div>

  <div class="card">
    <h2>Kirim Pengumuman</h2>
    <input type="text" id="judulInput" placeholder="Judul Pengumuman">
    <input type="text" id="isiInput" placeholder="Isi Pengumuman">
    <button onclick="updatePengumuman()">Kirim</button>
    <hr>
    <h3 id="judul-pengumuman">Belum ada</h3>
    <p id="isi-pengumuman">-</p>
  </div>

  <div class="card">
    <h2>Token Antrian: <span id="token">-</span></h2>
  </div>

<script type="module">
  // 1. Import Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

  // 2. CONFIG KAMU DARI FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyAc...NDZXNn",
    authDomain: "token-grab.firebaseapp.com",
    databaseURL: "https://token-grab-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "token-grab",
    storageBucket: "token-grab.firebasestorage.app",
    messagingSenderId: "871882982034",
    appId: "1:871882982034:web:7bd84c0eb44d5c0bb85c4b",
    measurementId: "G-8KDDS9C5XC"
  };

  // 3. Inisialisasi
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);

  // 4. Baca Data Real-time
  onValue(ref(db, 'status'), (snapshot) => {
    document.getElementById('status').innerText = snapshot.val() || "Kosong";
  });

  onValue(ref(db, 'announcement'), (snapshot) => {
    const data = snapshot.val();
    if(data){
      document.getElementById('judul-pengumuman').innerText = data.judul || "-";
      document.getElementById('isi-pengumuman').innerText = data.isi || "-";
    }
  });

  onValue(ref(db, 'token'), (snapshot) => {
    document.getElementById('token').innerText = snapshot.val() || "-";
  });

  // 5. Fungsi Update Data
  window.updateStatus = () => {
    const val = document.getElementById('statusInput').value;
    set(ref(db, 'status'), val);
  }

  window.updatePengumuman = () => {
    set(ref(db, 'announcement'), {
      judul: document.getElementById('judulInput').value,
      isi: document.getElementById('isiInput').value
    });
  }
</script>
</body>
</html>
