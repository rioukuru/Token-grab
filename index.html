<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Grab Mixroot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
      color: #38bdf8;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: #0f172a;
      color: #f8fafc;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      resize: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Token Grab Mixroot</h1>
    <textarea id="tokenBox" readonly>Memuat token...</textarea>
    <button onclick="copyToken()">Copy Token</button>
    <div class="status" id="status">Menunggu data dari Firebase...</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  
  <script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCmL-SDzNkLlLblj9dUpsTAY4BTjCupb-U",
      authDomain: "token-grab-mixroot.firebaseapp.com",
      databaseURL: "https://token-grab-mixroot-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "token-grab-mixroot",
      storageBucket: "token-grab-mixroot.firebasestorage.app",
      messagingSenderId: "662244516958",
      appId: "1:662244516958:web:5fc0da406b7f529f5240cf",
      measurementId: "G-X7FE7QRJJ9"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ambil data token dari Firebase
    const tokenRef = db.ref('token');
    tokenRef.on('value', (snapshot) => {
      const token = snapshot.val();
      if (token) {
        document.getElementById('tokenBox').value = token;
        document.getElementById('status').innerText = "Token berhasil dimuat ✅";
      } else {
        document.getElementById('status').innerText = "Token kosong. Isi di Firebase dulu.";
      }
    }, (error) => {
      document.getElementById('status').innerText = "Gagal connect: " + error.message;
    });

    // Fungsi copy
    function copyToken() {
      const tokenBox = document.getElementById('tokenBox');
      tokenBox.select();
      document.execCommand('copy');
      alert('Token berhasil di copy!');
    }
  </script>
</body>
</html>
