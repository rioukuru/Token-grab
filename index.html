<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Grab by MixRoot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,114,255,.4);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:15px;
    border-radius:50%;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    box-shadow:0 0 20px #00c6ff;
    color:white;
}

h1{
    color:#0072ff;
    font-size:26px;
    margin-bottom:5px;
}

p{
    color:#555;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:140px;
    border:2px solid #00c6ff;
    outline:none;
    resize:none;
    border-radius:18px;
    padding:15px;
    font-size:15px;
    background:rgba(255,255,255,1);
    color:#333;
}

textarea::placeholder{
    color:#999;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 20px rgba(0,114,255,.6);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 35px rgba(0,198,255,.8);
}

button:active{
    transform:scale(.96);
}

.footer{
    margin-top:18px;
    color:#777;
    font-size:13px;
}

.status{
    margin-top:10px;
    font-size:13px;
    color:#0072ff;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
🔑
</div>

<h1>Token Grab</h1>
<p>by MixRoot</p>

<textarea id="token" placeholder="Memuat token dari Firebase..." readonly></textarea>

<button onclick="copyToken()">
📋 Copy Token
</button>

<div class="status" id="status">Menghubungkan ke Firebase...</div>

<div class="footer">
© MixRoot
</div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// Firebase Config Baru
const firebaseConfig = {
  apiKey: "AIzaSyCmL-SDzNkLlLblj9dUpsTAY4BTjCupb-U",
  authDomain: "token-grab-mixroot.firebaseapp.com",
  databaseURL: "https://token-grab-mixroot-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "token-grab-mixroot",
  storageBucket: "token-grab-mixroot.firebasestorage.app",
  messagingSenderId: "662244516958",
  appId: "1:662244516958:web:5fc0da406b7f529f5240cf",
  measurementId: "G-X7FE7QRJJ9"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Ambil data token dari Firebase secara realtime
const tokenRef = db.ref('token');
tokenRef.on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    document.getElementById('token').value = data;
    document.getElementById('status').innerText = "✅ Token berhasil dimuat";
  } else {
    document.getElementById('status').innerText = "⚠️ Token kosong. Isi di Firebase dulu";
  }
}, (error) => {
  document.getElementById('status').innerText = "❌ Gagal: " + error.message;
});

function copyToken(){
    const token = document.getElementById("token");
    
    token.focus();
    token.select();
    token.setSelectionRange(0, 99999);
    
    try {
        document.execCommand('copy');
        document.getElementById('status').innerText = "📋 Token berhasil disalin!";
    } catch (err) {
        alert("Gagal menyalin. Coba tahan lama di kotak token > Salin");
    }
    
    window.getSelection().removeAllRanges();
}
</script>

</body>
</html>
