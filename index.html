<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    padding:20px;
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,114,255,.4);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:15px;
    border-radius:50%;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    box-shadow:0 0 20px #00c6ff;
    color:white;
}

h1{
    color:#0072ff;
    font-size:26px;
    margin-bottom:5px;
}

p{
    color:#555;
    margin-bottom:20px;
}

label{
    display:block;
    text-align:left;
    color:#0072ff;
    font-weight:bold;
    margin:10px 0 5px 0;
    font-size:14px;
}

#token{
    width:100%;
    height:160px;
    border:2px solid #00c6ff;
    outline:none;
    resize:none;
    border-radius:18px;
    padding:15px;
    font-size:12px;
    background:rgba(255,255,255,1);
    color:#333;
    word-break: break-all;
}

button{
    margin-top:15px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 20px rgba(0,114,255,.6);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 35px rgba(0,198,255,.8);
}

button:active{
    transform:scale(.96);
}

.footer{
    margin-top:18px;
    color:#777;
    font-size:13px;
}
</style>
