<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JOKI NOW</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAcdhJstLFtbehN9r_NDZXNnkdU69B4wH0",
authDomain: "token-grab.firebaseapp.com",
databaseURL: "https://token-grab-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "token-grab",
storageBucket: "token-grab.firebasestorage.app",
messagingSenderId: "871882982034",
appId: "1:871882982034:web:7bd84c0eb44d5c0bb85c4b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"token/value"),(snap)=>{
document.getElementById("token").innerHTML=snap.val();
});

onValue(ref(db,"announcement/text"),(snap)=>{
document.getElementById("info").innerHTML=snap.val();
});

onValue(ref(db,"status/online"),(snap)=>{
document.getElementById("status").innerHTML=snap.val() ? "🟢 ONLINE" : "🔴 OFFLINE";
});

window.copyToken=function(){
navigator.clipboard.writeText(document.getElementById("token").innerHTML);
alert("Token berhasil dicopy");
}

</script>

<style>

body{
background:#101010;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin:15px auto;
max-width:500px;
box-shadow:0 0 20px lime;
}

button{
background:lime;
color:black;
padding:12px;
border:0;
border-radius:10px;
font-weight:bold;
width:100%;
}

</style>

</head>

<body>

<h1>JOKI NOW</h1>

<div class="box">

<h2 id="status">Loading...</h2>

<h3>TOKEN</h3>

<h2 id="token">Loading...</h2>

<button onclick="copyToken()">
COPY TOKEN
</button>

</div>

<div class="box">

<h3>PENGUMUMAN</h3>

<p id="info">Loading...</p>

</div>

</body>
</html>
