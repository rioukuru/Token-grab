<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin TOKEN GRAB</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f2f2f2; }
    .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #FF5722; }
    input, button, select { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    button { background: #FF5722; color: white; cursor: pointer; font-weight: bold; border: none; }
  </style>
</head>
<body>
  <h1>Dashboard TOKEN GRAB</h1>

  <div class="card">
    <h2>Status: <span id="status">Loading...</span></h2>
    <select id="statusInput">
      <option value="true">Online / Buka</option>
      <option value="false">Offline / Tutup</option>
    </select>
    <button onclick="updateStatus()">Update Status</button>
  </div>

  <div class="card">
    <h2>Pengumuman</h2>
    <input type="text" id="pengumumanInput" placeholder="Tulis pengumuman">
    <button onclick="updatePengumuman()">Kirim</button>
    <hr>
    <p id="pengumuman">Loading...</p>
  </div>

  <div class="card">
    <h2>Token Antrian: <span id="token">Loading...</span></h2>
    <input type="text" id="tokenInput" placeholder="Contoh: A005">
    <button onclick="updateToken()">Update Token</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAc...NDZXNn",
    authDomain: "token-grab.firebaseapp.com",
    databaseURL: "https://token-grab-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "token-grab",
    storageBucket: "token-grab.firebasestorage.app",
    messagingSenderId: "871882982034",
    appId: "1:871882982034:web:7bd84c0eb44d5c0bb85c4b",
    measurementId: "G-8KDDS9C5XC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 1. Baca Real-time
  onValue(ref(db, 'status/online'), (s) => {
    document.getElementById('status').innerText = s.val() ? "Buka" : "Tutup";
    document.getElementById('status').style.color = s.val() ? "green" : "red";
  });

  onValue(ref(db, 'announcement/text'), (s) => {
    document.getElementById('pengumuman').innerText = s.val() || "-";
  });

  onValue(ref(db, 'token/value'), (s) => {
    document.getElementById('token').innerText = s.val() || "-";
  });

  // 2. Update
  window.updateStatus = () => {
    const val = document.getElementById('statusInput').value === "true";
    set(ref(db, 'status/online'), val);
  }

  window.updatePengumuman = () => {
    set(ref(db, 'announcement/text'), document.getElementById('pengumumanInput').value);
  }

  window.updateToken = () => {
    set(ref(db, 'token/value'), document.getElementById('tokenInput').value);
  }
</script>
</body>
</html>
