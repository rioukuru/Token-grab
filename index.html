}

button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 35px rgba(0,198,255,.8);
}

button:active{
    transform:scale(.96);
}

.note{
    margin-top:25px;
    padding:15px;
    border-radius:15px;
    background:linear-gradient(135deg,#fff3cd,#ffeeba);
    border:2px solid #ffc107;

}

.note h3{

    font-size:16px;
    margin-bottom:8px;
    text-align:center;
}

.note p{

}

.note a{

    font-weight:bold;

}

.note a:hover{
