<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Grab Mixroot</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 550px;
      text-align: center;
      border: 1px solid #334155;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
      border-radius: 50%;
    }
    h1 {
      margin: 10px 0 5px;
      color: #38bdf8;
      font-size: 24px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 25px;
    }
    textarea {
      width: 100%;
      height: 140px;
      background: #0f172a;
      color: #f8fafc;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      resize: none;
      font-family: 'Courier New', monospace;
      box-sizing: border-box;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      flex: 1;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }
    button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.imgur.com/8Km9tLL.png" alt="Logo" class="logo">
    <h1>Token Grab Mixroot</h1>
    <p class="subtitle">Auto update dari Firebase</p>
    
    <textarea id="tokenBox" readonly>Memuat token...</textarea>
    
    <div class="btn-group">
      <button onclick="copyToken()">📋 Copy Token</button>
      <button onclick="location.reload()">🔄 Refresh</button>
    </div>
    
    <div class="status" id="status">Menghubungkan ke Firebase...</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  
  <script>
    // Firebase Config Baru
    const firebaseConfig = {
      apiKey: "AIzaSyCmL-SDzNkLlLblj9dUpsTAY4BTjCupb-U",
      authDomain: "token-grab-mixroot.firebaseapp.com",
      databaseURL: "https://token-grab-mixroot-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "token-grab-mixroot",
      storageBucket: "token-grab-mixroot.firebasestorage.app",
      messagingSenderId: "662244516958",
      appId: "1:662244516958:web:5fc0da406b7f529f5240cf",
      measurementId: "G-X7FE7QRJJ9"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ambil data token dari Firebase secara realtime
    const tokenRef = db.ref('token');
    tokenRef.on('value', (snapshot) => {
      const token = snapshot.val();
      if (token) {
        document.getElementById('tokenBox').value = token;
        document.getElementById('status').innerText = "✅ Token berhasil dimuat dari Firebase";
      } else {
        document.getElementById('status').innerText = "⚠️ Token kosong. Silakan isi di Firebase";
      }
    }, (error) => {
      document.getElementById('status').innerText = "❌ Gagal connect: " + error.message;
    });

    // Fungsi copy
    function copyToken() {
      const tokenBox = document.getElementById('tokenBox');
      tokenBox.select();
      document.execCommand('copy');
      document.getElementById('status').innerText = "📋 Token berhasil di copy!";
      setTimeout(() => {
        document.getElementById('status').innerText = "✅ Token berhasil dimuat dari Firebase";
      }, 2000);
    }
  </script>
</body>
</html>
