<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Grab by MixRoot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,0,0,.4);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:15px;
    border-radius:50%;
    background:linear-gradient(135deg,#00f2fe,#4facfe);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    box-shadow:0 0 20px #4facfe;
}

h1{
    color:white;
    font-size:26px;
    margin-bottom:5px;
}

p{
    color:#ddd;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:140px;
    border:none;
    outline:none;
    resize:none;
    border-radius:18px;
    padding:15px;
    font-size:15px;
    background:rgba(255,255,255,.15);
    color:white;
}

textarea::placeholder{
    color:#ddd;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#00dbde,#fc00ff);
    box-shadow:0 0 20px rgba(252,0,255,.6);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 35px rgba(0,255,255,.8);
}

button:active{
    transform:scale(.96);
}

.footer{
    margin-top:18px;
    color:#eee;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
🔑
</div>

<h1>Token Grab</h1>
<p>by MixRoot</p>

<textarea id="token" placeholder="Paste token di sini..."></textarea>

<button onclick="copyToken()">
📋 Copy Token
</button>

<div class="footer">
© MixRoot
</div>

</div>

<script>
function copyToken(){
    const token=document.getElementById("token");
    navigator.clipboard.writeText(token.value).then(()=>{
        alert("✅ Token berhasil disalin!");
    });
}
</script>

</body>
</html>
