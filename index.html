<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Grab</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.box{
    background:#161b22;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#21262d;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}

pre{
    white-space:pre-wrap;
}
</style>

</head>
<body>

<div class="container">

<h1>TOKEN GRAB</h1>

<div class="box">
<h3>Status</h3>
<pre id="status">Loading...</pre>
</div>

<div class="box">
<h3>Announcement</h3>
<pre id="announcement">Loading...</pre>
</div>

</div>

</body>
</html>
